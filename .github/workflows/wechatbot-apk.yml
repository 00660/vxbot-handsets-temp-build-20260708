name: WeChat Bot APK

on:
  push:
    branches:
      - main
      - master
    paths:
      - "app/**"
      - "src/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - ".github/workflows/wechatbot-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release
          apk="$(ls app/build/outputs/apk/debug/*.apk | head -1)"
          cp "$apk" release/hs-wechatbot-latest.apk
          {
            echo "sha=$GITHUB_SHA"
            echo "run_id=$GITHUB_RUN_ID"
            echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "apk=hs-wechatbot-latest.apk"
          } > release/BUILD_INFO.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes="自动发布最新调试版 APK。构建提交：${GITHUB_SHA}"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest release/hs-wechatbot-latest.apk release/BUILD_INFO.txt --clobber
            gh release edit latest --title "HS 微信机器人 APK 最新版" --notes "$notes"
          else
            gh release create latest release/hs-wechatbot-latest.apk release/BUILD_INFO.txt \
              --title "HS 微信机器人 APK 最新版" \
              --notes "$notes"
          fi

      - name: Upload APK
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: hs-wechatbot-debug-apk
          path: release/hs-wechatbot-latest.apk

      - name: Publish APK to output branch
        shell: bash
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          cp release/hs-wechatbot-latest.apk "$out/hs-wechatbot-latest.apk"
          cp release/BUILD_INFO.txt "$out/BUILD_INFO.txt"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan apk-build-output
          git rm -rf . >/dev/null 2>&1 || true
          cp "$out/hs-wechatbot-latest.apk" .
          cp "$out/BUILD_INFO.txt" .
          git add hs-wechatbot-latest.apk BUILD_INFO.txt
          git commit -m "Publish APK for ${GITHUB_SHA}"
          git push --force origin HEAD:apk-build-output
